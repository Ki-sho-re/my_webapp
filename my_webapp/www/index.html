<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My WebApp</title>

    <!-- Basic CSS styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #4c8bf5;
            color: white;
            padding: 20px;
        }
        main {
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            background-color: #4c8bf5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3a6ed8;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My WebApp</h1>
    </header>
    <main>
        <h2>This is your first custom Frappe web page!</h2>
        <p>You can now design it using HTML, CSS, and JS.</p>
        <button onclick="alert('Hello from Frappe!')">Click Me</button>
    </main>
</body>
</html>
